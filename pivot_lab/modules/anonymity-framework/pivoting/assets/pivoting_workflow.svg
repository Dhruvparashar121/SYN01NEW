<circle cx="940" cy="276" r="16" fill="rgba(255,255,255,.08)" stroke="#00ff88"/><text x="940" y="281" class="iconText" fill="#00ff88" text-anchor="middle">04</text>
<text x="974" y="276" class="nodeTitle" fill="#eefbff">Internal Target</text>
<text x="936" y="315" class="nodeSub" fill="#9fb4c9">172.20.10.2</text><text x="936" y="333" class="nodeSub" fill="#9fb4c9">service response</text><text x="936" y="351" class="nodeSub" fill="#9fb4c9">end of route</text>

<rect x="1298" y="154" width="142" height="84" rx="20" fill="#102033" stroke="#00ff88" stroke-width="2" class="node-card"/>
<text x="1316" y="182" class="nodeTitle" fill="#eefbff">Alert</text><text x="1316" y="215" class="nodeSub" fill="#9fb4c9">scan + login</text>
<rect x="1298" y="282" width="142" height="84" rx="20" fill="#102033" stroke="#00ff88" stroke-width="2" class="node-card"/>
<text x="1316" y="310" class="nodeTitle" fill="#eefbff">Alert</text><text x="1316" y="343" class="nodeSub" fill="#9fb4c9">ARP / SMB</text>
<rect x="1298" y="410" width="142" height="84" rx="20" fill="#102033" stroke="#00ff88" stroke-width="2" class="node-card"/>
<text x="1316" y="438" class="nodeTitle" fill="#eefbff">Alert</text><text x="1316" y="471" class="nodeSub" fill="#9fb4c9">target access</text>

<path id="p1" class="flow" d="M294 258 C340 258 374 204 424 204" stroke="#00d5ff" marker-end="url(#arrowCyan)"/>
<path id="p2" class="flow" d="M542 258 C542 312 574 324 610 354" stroke="#38bdf8" marker-end="url(#arrowCyan)"/>
<path id="p3" class="flow" d="M728 408 C800 408 826 308 910 308" stroke="#a78bfa" marker-end="url(#arrowViolet)"/>
<path id="p4" class="flowThin" d="M1180 308 C1226 292 1260 324 1298 324" stroke="#00ff88" marker-end="url(#arrowGreen)"/>
<path id="p5" class="flowThin" d="M1180 308 C1232 345 1258 448 1298 452" stroke="#00ff88" marker-end="url(#arrowGreen)"/>
<path id="p6" class="flowThin" d="M660 204 C900 150 1130 150 1298 196" stroke="#00ff88" opacity=".6" marker-end="url(#arrowGreen)"/>
<g style="color:#00d5ff"><circle r="5" fill="#00d5ff" class="packet"><animateMotion dur="2.8s" repeatCount="indefinite"><mpath href="#p1"/></animateMotion></circle></g>
<g style="color:#38bdf8"><circle r="5" fill="#38bdf8" class="packet"><animateMotion dur="3.1s" begin=".35s" repeatCount="indefinite"><mpath href="#p2"/></animateMotion></circle></g>
<g style="color:#a78bfa"><circle r="5" fill="#a78bfa" class="packet"><animateMotion dur="3.2s" begin=".55s" repeatCount="indefinite"><mpath href="#p3"/></animateMotion></circle></g>
<g style="color:#00ff88"><circle r="5" fill="#00ff88" class="packet"><animateMotion dur="3.4s" begin=".85s" repeatCount="indefinite"><mpath href="#p4"/></animateMotion></circle></g>

<rect x="68" y="620" width="1370" height="134" rx="26" fill="url(#panel)" stroke="rgba(255,255,255,.14)"/>
<text x="96" y="657" class="zoneTitle" fill="#e9fbff">PIVOTING FLOW SUMMARY</text>
<text x="96" y="688" class="noteText">1 Identify exposed service &gt; 2 gain controlled foothold &gt; 3 elevate for route control &gt; 4 discover hidden subnet.</text>
<text x="96" y="716" class="noteText">5 Add autoroute + SOCKS &gt; 6 scan through proxychains &gt; 7 validate internal target &gt; 8 correlate defender evidence.</text>
<text x="96" y="744" class="smallText">Final topology now ends at one Internal Target only; no separate endpoint box is shown after it.</text>
</svg>