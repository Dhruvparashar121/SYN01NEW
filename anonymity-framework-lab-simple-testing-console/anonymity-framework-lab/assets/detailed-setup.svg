<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#082f49"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0 0 L13 5 L0 10 Z" fill="#22c55e"/>
    </marker>
    <style>
      .title{font:900 34px 'Segoe UI',Arial,sans-serif;fill:#e5e7eb}
      .subtitle{font:600 15px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
      .box-title{font:900 18px 'Segoe UI',Arial,sans-serif;fill:#fff}
      .ip{font:700 15px 'Consolas','Courier New',monospace;fill:#cbd5e1}
      .note{font:600 12px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
      .node{fill:#111827;stroke-width:3;filter:url(#glow)}
      .line{fill:none;stroke:#22c55e;stroke-width:5;marker-end:url(#arrow);stroke-linecap:round;stroke-dasharray:12 10;animation:dash 1.4s linear infinite}
      .flow{filter:url(#glow)}
      @keyframes dash{to{stroke-dashoffset:-44}}
      .pulse{animation:pulse 1.8s ease-in-out infinite alternate;transform-origin:center}
      @keyframes pulse{from{opacity:.65}to{opacity:1}}
      .blink{animation:blink 1.2s ease-in-out infinite alternate}
      @keyframes blink{from{opacity:.35}to{opacity:1}}
    </style>
  </defs>

  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1040" cy="110" r="150" fill="#38bdf8" opacity="0.06"/>
  <circle cx="160" cy="650" r="190" fill="#a855f7" opacity="0.06"/>

  <text x="600" y="58" text-anchor="middle" class="title">Anonymity Framework Lab Flow</text>
  <text x="600" y="88" text-anchor="middle" class="subtitle">Client → Firewall → VPS-1 → VPS-2 → Tor Exit Rotation → IT Network</text>

  <!-- Flow lines -->
  <path id="route" class="line" d="M190 250 H345 H500 H655 C760 250 760 470 655 470 H500 H345 H190"/>

  <!-- animated packets -->
  <circle r="8" fill="#38bdf8" class="flow">
    <animateMotion dur="5.2s" repeatCount="indefinite"><mpath href="#route"/></animateMotion>
  </circle>
  <circle r="6" fill="#facc15" class="flow">
    <animateMotion dur="5.2s" begin="1.6s" repeatCount="indefinite"><mpath href="#route"/></animateMotion>
  </circle>
  <circle r="6" fill="#22c55e" class="flow">
    <animateMotion dur="5.2s" begin="3.2s" repeatCount="indefinite"><mpath href="#route"/></animateMotion>
  </circle>

  <!-- Node 1 Client -->
  <g transform="translate(55 185)">
    <rect class="node" width="135" height="130" rx="22" stroke="#38bdf8"/>
    <rect x="39" y="22" width="58" height="36" rx="4" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
    <rect x="58" y="60" width="20" height="10" fill="#38bdf8"/>
    <rect x="45" y="70" width="46" height="7" rx="3" fill="#38bdf8"/>
    <text x="67.5" y="96" text-anchor="middle" class="box-title">1 Client</text>
    <text x="67.5" y="119" text-anchor="middle" class="ip">10.0.30.10</text>
  </g>

  <!-- Node 2 Firewall -->
  <g transform="translate(345 185)">
    <rect class="node" width="135" height="130" rx="22" stroke="#facc15"/>
    <path d="M67 20 L102 35 V62 C102 82 87 94 67 104 C47 94 32 82 32 62 V35 Z" fill="#1f2937" stroke="#facc15" stroke-width="3"/>
    <path d="M50 63 L62 75 L88 47" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="67.5" y="96" text-anchor="middle" class="box-title">2 Firewall</text>
    <text x="67.5" y="119" text-anchor="middle" class="ip">10.0.30.1</text>
  </g>

  <!-- Node 3 VPS1 -->
  <g transform="translate(635 185)">
    <rect class="node" width="135" height="130" rx="22" stroke="#22c55e"/>
    <rect x="37" y="22" width="62" height="22" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="3"/>
    <rect x="37" y="50" width="62" height="22" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="3"/>
    <circle cx="87" cy="33" r="3" fill="#22c55e" class="blink"/>
    <circle cx="87" cy="61" r="3" fill="#22c55e" class="blink"/>
    <text x="67.5" y="96" text-anchor="middle" class="box-title">3 VPS-1</text>
    <text x="67.5" y="119" text-anchor="middle" class="ip">10.0.10.26</text>
  </g>

  <!-- Node 4 VPS2 -->
  <g transform="translate(635 405)">
    <rect class="node" width="135" height="130" rx="22" stroke="#22c55e"/>
    <rect x="37" y="22" width="62" height="22" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="3"/>
    <rect x="37" y="50" width="62" height="22" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="3"/>
    <circle cx="87" cy="33" r="3" fill="#22c55e" class="blink"/>
    <circle cx="87" cy="61" r="3" fill="#22c55e" class="blink"/>
    <text x="67.5" y="96" text-anchor="middle" class="box-title">4 VPS-2</text>
    <text x="67.5" y="119" text-anchor="middle" class="ip">10.0.20.100</text>
  </g>

  <!-- Node 5 Tor -->
  <g transform="translate(345 405)">
    <rect class="node" width="135" height="130" rx="22" stroke="#a855f7"/>
    <circle cx="67.5" cy="48" r="28" fill="#2e1065" stroke="#a855f7" stroke-width="3"/>
    <path d="M67 20 C84 37 84 60 67 76 C50 60 50 37 67 20Z" fill="#a855f7" opacity=".65" class="pulse"/>
    <path d="M42 49 H93 M67 24 V74" stroke="#e9d5ff" stroke-width="3" opacity=".85"/>
    <text x="67.5" y="96" text-anchor="middle" class="box-title">5 Tor</text>
    <text x="67.5" y="119" text-anchor="middle" class="ip">Exit rotation</text>
  </g>

  <!-- Node 6 IT Network -->
  <g transform="translate(55 405)">
    <rect class="node" width="135" height="130" rx="22" stroke="#ef4444"/>
    <circle cx="67.5" cy="45" r="27" fill="#1f2937" stroke="#ef4444" stroke-width="3"/>
    <path d="M42 45 H93 M67 18 V72 M49 27 C61 38 74 38 86 27 M49 63 C61 52 74 52 86 63" stroke="#fecaca" stroke-width="3" fill="none"/>
    <text x="67.5" y="96" text-anchor="middle" class="box-title">6 IT Net</text>
    <text x="67.5" y="119" text-anchor="middle" class="ip">10.0.40.100</text>
  </g>

  <!-- Legend / explanation -->
  <g transform="translate(830 185)">
    <rect width="300" height="350" rx="24" fill="#020617" opacity=".62" stroke="#334155"/>
    <text x="24" y="42" class="box-title">Visual Guide</text>
    <circle cx="32" cy="78" r="7" fill="#38bdf8"/><text x="52" y="83" class="note">Client source machine</text>
    <circle cx="32" cy="113" r="7" fill="#facc15"/><text x="52" y="118" class="note">Firewall / gateway filter</text>
    <circle cx="32" cy="148" r="7" fill="#22c55e"/><text x="52" y="153" class="note">VPN relay servers</text>
    <circle cx="32" cy="183" r="7" fill="#a855f7"/><text x="52" y="188" class="note">Tor layer remains unchanged</text>
    <circle cx="32" cy="218" r="7" fill="#ef4444"/><text x="52" y="223" class="note">IT network destination</text>
    <path d="M24 260 H190" stroke="#22c55e" stroke-width="5" stroke-dasharray="12 10" marker-end="url(#arrow)"/>
    <text x="24" y="292" class="note">Animated packets show the traffic path.</text>
    <text x="24" y="320" class="note">All IPs are lab/simulation values.</text>
  </g>

  <text x="600" y="666" text-anchor="middle" class="subtitle">Updated IP Map: Client 10.0.30.10 | Firewall 10.0.30.1 | VPS‑1 10.0.10.26 | VPS‑2 10.0.20.100 | IT Net 10.0.40.100</text>
</svg>
