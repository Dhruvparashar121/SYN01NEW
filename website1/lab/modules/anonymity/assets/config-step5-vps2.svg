<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340">
<style>
.bg{fill:#07111f}.title{fill:#e5e7eb;font:700 25px Arial}.sub{fill:#94a3b8;font:15px Arial}.node{fill:#10233a;stroke:#38bdf8;stroke-width:3}.active{fill:#122f1d;stroke:#22c55e;stroke-width:5;filter:url(#glow)}.label{fill:#fff;font:700 13px Arial}.ip{fill:#94a3b8;font:11px Consolas}.link{stroke:#334155;stroke-width:8;stroke-linecap:round}.packet{fill:#22c55e;filter:url(#glow)}.packetText{fill:#020617;font:700 12px Consolas}@keyframes move{0%{transform:translateX(0);opacity:.2}15%{opacity:1}100%{transform:translateX(500px);opacity:.95}}.packetGroup{animation:move 4s linear infinite}
</style><defs><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
