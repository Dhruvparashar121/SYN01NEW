<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06111f"/>
      <stop offset="55%" stop-color="#102047"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#064e3b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#22c55e"/>
    </marker>
    <style>
      .title{font-family:Segoe UI,Arial,sans-serif;font-weight:900}
      .label{font-family:Segoe UI,Arial,sans-serif;font-weight:800}
      .small{font-family:Segoe UI,Arial,sans-serif;font-weight:600}
      .card{filter:url(#glow)}
      .float{animation:float 4.5s ease-in-out infinite;transform-origin:center}
      .pulse{animation:pulse 1.8s ease-in-out infinite;transform-origin:center}
      .dash{stroke-dasharray:10 12;animation:dash 1.5s linear infinite}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
      @keyframes pulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.13)}}
      @keyframes dash{to{stroke-dashoffset:-44}}
    </style>
  </defs>

  <rect width="1100" height="560" rx="32" fill="url(#bg)"/>

  <!-- Header -->
  <text x="550" y="52" text-anchor="middle" fill="#22c55e" font-size="34" class="title">WHY ANONYMITY FRAMEWORK MATTERS</text>
  <text x="550" y="82" text-anchor="middle" fill="#cbd5e1" font-size="17" class="small">visibility control • privacy protection • leak awareness • safe training</text>

  <!-- Center shield: text has its own clear area, lock icon below -->
  <g filter="url(#glow)">
    <path d="M550 120l118 48v82c0 84-52 132-118 166-66-34-118-82-118-166v-82z" fill="url(#shieldGrad)" stroke="#22c55e" stroke-width="4"/>
    <text x="550" y="202" text-anchor="middle" fill="#ffffff" font-size="26" class="title">ANONYMITY</text>
    <text x="550" y="235" text-anchor="middle" fill="#22c55e" font-size="27" class="title">FRAMEWORK</text>
    <text x="550" y="270" text-anchor="middle" fill="#cbd5e1" font-size="15" class="small">reduces direct exposure</text>

    <!-- lock placed below text, not behind it -->
    <rect x="523" y="304" width="54" height="42" rx="8" fill="#22c55e" opacity=".9"/>
    <path d="M535 304v-15c0-21 30-21 30 0v15" fill="none" stroke="#bbf7d0" stroke-width="6" stroke-linecap="round"/>
    <circle cx="550" cy="324" r="5" fill="#052e16"/>
    <path d="M550 330v8" stroke="#052e16" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Clean connecting paths -->
  <path id="p1" d="M350 165 C392 165, 420 180, 438 205" fill="none" stroke="#38bdf8" stroke-width="3" opacity=".75" marker-end="url(#arrowGreen)" class="dash"/>
  <path id="p2" d="M750 165 C708 165, 680 180, 662 205" fill="none" stroke="#a855f7" stroke-width="3" opacity=".75" marker-end="url(#arrowGreen)" class="dash"/>
  <path id="p3" d="M350 415 C395 410, 425 385, 450 350" fill="none" stroke="#facc15" stroke-width="3" opacity=".75" marker-end="url(#arrowGreen)" class="dash"/>
  <path id="p4" d="M750 415 C705 410, 675 385, 650 350" fill="none" stroke="#22c55e" stroke-width="3" opacity=".75" marker-end="url(#arrowGreen)" class="dash"/>

  <!-- Small packets only on paths, away from text -->
  <circle r="5" fill="#22c55e"><animateMotion dur="4s" repeatCount="indefinite"><mpath href="#p1"/></animateMotion></circle>
  <circle r="5" fill="#22c55e"><animateMotion dur="4.2s" repeatCount="indefinite"><mpath href="#p2"/></animateMotion></circle>
  <circle r="5" fill="#22c55e"><animateMotion dur="4.4s" repeatCount="indefinite"><mpath href="#p3"/></animateMotion></circle>
  <circle r="5" fill="#22c55e"><animateMotion dur="4.6s" repeatCount="indefinite"><mpath href="#p4"/></animateMotion></circle>

  <!-- Card 1: icon top, text bottom separated -->
  <g class="card float">
    <rect x="70" y="110" width="280" height="150" rx="22" fill="#10233a" stroke="#38bdf8" stroke-width="2"/>
    <g transform="translate(105 136)">
      <circle cx="34" cy="34" r="27" fill="#0f172a" stroke="#7dd3fc" stroke-width="3"/>
      <path d="M16 34h36M34 16v36" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round"/>
      <circle cx="34" cy="34" r="7" fill="#38bdf8" class="pulse"/>
    </g>
    <text x="245" y="150" text-anchor="middle" fill="#ffffff" font-size="21" class="label">Traffic Visibility</text>
    <text x="245" y="186" text-anchor="middle" fill="#cbd5e1" font-size="14" class="small">See where packets enter,</text>
    <text x="245" y="207" text-anchor="middle" fill="#cbd5e1" font-size="14" class="small">travel, and exit.</text>
  </g>

  <!-- Card 2 -->
  <g class="card float">
    <rect x="750" y="110" width="280" height="150" rx="22" fill="#10233a" stroke="#a855f7" stroke-width="2"/>
    <g transform="translate(785 135)">
      <rect x="0" y="0" width="62" height="62" rx="10" fill="#0f172a" stroke="#e9d5ff" stroke-width="3"/>
      <path d="M13 19h35M13 34h35M13 49h25" stroke="#c084fc" stroke-width="4" stroke-linecap="round"/>
    </g>
    <text x="925" y="150" text-anchor="middle" fill="#ffffff" font-size="21" class="label">Log Correlation</text>
    <text x="925" y="186" text-anchor="middle" fill="#cbd5e1" font-size="14" class="small">Understand what logs</text>
    <text x="925" y="207" text-anchor="middle" fill="#cbd5e1" font-size="14" class="small">can reveal.</text>
  </g>

  <!-- Card 3 -->
  <g class="card float">
    <rect x="70" y="350" width="280" height="150" rx="22" fill="#10233a" stroke="#facc15" stroke-width="2"/>
    <g transform="translate(105 374)">
      <path d="M35 4 C16 22, 10 52, 35 76 C60 52, 54 22, 35 4Z" fill="#0f172a" stroke="#fde68a" stroke-width="3"/>
      <path d="M24 42 C35 33, 50 39, 55 52" fill="none" stroke="#facc15" stroke-width="4" stroke-linecap="round" class="pulse"/>
    </g>
    <text x="245" y="390" text-anchor="middle" fill="#ffffff" font-size="21" class="label">Leak Awareness</text>
    <text x="245" y="426" text-anchor="middle" fill="#cbd5e1" font-size="14" class="small">Detect DNS, IP leaks,</text>
    <text x="245" y="447" text-anchor="middle" fill="#cbd5e1" font-size="14" class="small">and routing exposure.</text>
  </g>

  <!-- Card 4 -->
  <g class="card float">
    <rect x="750" y="350" width="280" height="150" rx="22" fill="#10233a" stroke="#22c55e" stroke-width="2"/>
    <g transform="translate(785 378)">
      <rect x="0" y="0" width="64" height="46" rx="8" fill="#0f172a" stroke="#86efac" stroke-width="3"/>
      <path d="M12 16h40M12 31h28" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
      <path d="M-8 58h80" stroke="#86efac" stroke-width="5" stroke-linecap="round"/>
    </g>
    <text x="925" y="390" text-anchor="middle" fill="#ffffff" font-size="21" class="label">Safe Lab Training</text>
    <text x="925" y="426" text-anchor="middle" fill="#cbd5e1" font-size="14" class="small">Learn in isolated,</text>
    <text x="925" y="447" text-anchor="middle" fill="#cbd5e1" font-size="14" class="small">controlled networks.</text>
  </g>

  <!-- Bottom note -->
  <rect x="300" y="505" width="500" height="34" rx="17" fill="#020617" opacity=".72" stroke="#334155"/>
  <text x="550" y="527" text-anchor="middle" fill="#e2e8f0" font-size="14" class="small">Purpose: reduce exposure while keeping training safe, visible, and controlled.</text>
</svg>