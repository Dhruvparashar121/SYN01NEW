- id: r02-service-scan
  name: Aggressive Port and Service Scan
  description: Full port scan with version detection on all targets
  tactic: reconnaissance
  technique:
    attack_id: T1595.001
    name: Active Scanning - Scanning IP Blocks
  platforms:
    linux:
      sh:
        command: |
          nmap -sV -p 22,21,80,443,3306,3389,445,8080,9001,9002 10.0.20.10 10.0.20.21 10.0.20.30 10.0.20.40 10.0.20.150 10.0.20.200 2>/dev/null | grep -E 'open|PORT' | head -30
        cleanup: |
          rm -f /tmp/service_scan.txt
  singleton: false
  repeatable: false
