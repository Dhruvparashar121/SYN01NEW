- id: r03-web-fingerprint
  name: Web Application Fingerprinting
  description: Fingerprint web apps on web-server-1 ports 9001 and 9002
  tactic: reconnaissance
  technique:
    attack_id: T1595.002
    name: Active Scanning - Vulnerability Scanning
  platforms:
    linux:
      sh:
        command: |
          curl -sI http://10.0.20.21:9001 2>/dev/null | grep -E 'Server|X-Powered|Content-Type'; curl -sI http://10.0.20.21:9002 2>/dev/null | grep -E 'Server|X-Powered'

  singleton: false
  repeatable: false
