- id: r05-smb-enum
  name: SMB Enumeration Windows Targets
  description: Enumerate SMB shares and security mode on windows-1 and ADDC
  tactic: reconnaissance
  technique:
    attack_id: T1595.001
    name: Active Scanning
  platforms:
    linux:
      sh:
        command: |
          nmap -p 445 --script smb-security-mode,smb2-security-mode,smb-enum-shares 10.0.20.150 10.0.20.101 2>/dev/null | grep -E 'open|smb|445'

  singleton: false
  repeatable: false
