- id: disc03-share-enum
  name: Network Share Enumeration
  description: Enumerate NFS and SMB shares across the network
  tactic: discovery
  technique:
    attack_id: T1135
    name: Network Share Discovery
  platforms:
    linux:
      sh:
        command: |
          showmount -e 10.0.20.30 2>/dev/null; showmount -e 10.0.20.200 2>/dev/null; smbclient -L //10.0.20.150 -U Administrator%Admin@123 2>/dev/null | head -15

  singleton: false
  repeatable: false
