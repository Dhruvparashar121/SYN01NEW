- id: disc01-ad-users
  name: AD Domain User Enumeration
  description: Enumerate all users groups and computers in cyberstrike.mil
  tactic: discovery
  technique:
    attack_id: T1087.002
    name: Account Discovery - Domain Account
  platforms:
    linux:
      sh:
        command: |
          GetADUsers.py -all cyberstrike.mil/ansible:abc@123 -dc-ip 10.0.20.101 2>/dev/null > /tmp/domain_users.txt; echo "Domain users: $(wc -l < /tmp/domain_users.txt)"; cat /tmp/domain_users.txt | head -20
        cleanup: |
          rm -f /tmp/domain_users.txt
  singleton: false
  repeatable: false
