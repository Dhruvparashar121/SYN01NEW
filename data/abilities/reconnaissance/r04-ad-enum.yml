- id: r04-ad-enum
  name: AD Domain Unauthenticated Enumeration
  description: Enumerate AD domain via LDAP and RPC without credentials
  tactic: reconnaissance
  technique:
    attack_id: T1595.001
    name: Active Scanning
  platforms:
    linux:
      sh:
        command: |
          nmap -p 88,389,636,3268 10.0.20.101 -sV 2>/dev/null | grep -E 'open|PORT'; rpcclient -U '' -N 10.0.20.101 -c 'enumdomusers' 2>/dev/null | head -20 || echo 'RPC enum complete'

  singleton: false
  repeatable: false
